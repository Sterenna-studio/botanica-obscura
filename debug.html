<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debug — Botanica Obscura</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%8C%BF%3C%2Ftext%3E%3C%2Fsvg%3E" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles/debug.css" />
</head>
<body>
  <header class="site-header debug-header">
    <a href="index.html" class="back-link">← Retour au jeu</a>
    <h1>🧪 Botanica Debug</h1>
    <p class="muted">Diagnostic lecture seule pour vérifier joueur, graines, pots et codex.</p>
  </header>

  <main class="debug-main">
    <section class="debug-card">
      <div class="debug-card-head">
        <h2>Session</h2>
        <button id="refreshDebugBtn" type="button">🔄 Rafraîchir</button>
      </div>
      <pre id="debugSession" class="debug-pre">Chargement...</pre>
    </section>

    <section class="debug-grid">
      <article class="debug-card">
        <h2>Progression</h2>
        <pre id="debugPlayer" class="debug-pre">—</pre>
      </article>
      <article class="debug-card">
        <h2>Graines</h2>
        <pre id="debugSeeds" class="debug-pre">—</pre>
      </article>
      <article class="debug-card">
        <h2>Pots actifs</h2>
        <pre id="debugPots" class="debug-pre">—</pre>
      </article>
      <article class="debug-card">
        <h2>Codex</h2>
        <pre id="debugCodex" class="debug-pre">—</pre>
      </article>
    </section>
  </main>

  <script type="module" src="debug.js"></script>
</body>
</html>
