<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Botanica Obscura — Classement</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles/leaderboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>🌿 Botanica Obscura</h1>
      <p class="subtitle">Classement des Botanistes</p>
    </div>
    <div class="player-stats">
      <a href="index.html" class="nav-link">← Retour au jardin</a>
    </div>
  </header>

  <main class="lb-main">
    <h2 class="lb-title">🏆 Hall of Fame</h2>

    <div class="lb-tabs" role="tablist">
      <button class="lb-tab active" data-tab="xp" role="tab">Classement XP</button>
      <button class="lb-tab" data-tab="codex" role="tab">Codex découvert</button>
    </div>

    <div id="lb-podium" class="lb-podium" aria-label="Top 3"></div>

    <table class="lb-table" aria-label="Classement complet">
      <thead>
        <tr>
          <th>#</th>
          <th class="lb-col-name">Botaniste</th>
          <th>Codex</th>
          <th>Niveau</th>
          <th>XP</th>
        </tr>
      </thead>
      <tbody id="lb-body">
        <tr><td colspan="5" class="lb-loading">Chargement…</td></tr>
      </tbody>
    </table>

    <p id="lb-empty" class="lb-empty" hidden>Aucun botaniste classé pour l’instant. Soyez le premier !</p>
    <p id="lb-error" class="lb-error" hidden>Erreur de chargement. Vérifiez votre connexion.</p>
  </main>

  <script type="module" src="leaderboard.js"></script>
</body>
</html>
